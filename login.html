<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tax Connect</title>

<link rel="stylesheet" href="css/style.css">

<style>

.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f6f9;
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:8px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

.login-box button{
width:100%;
padding:12px;
background:#0a4fa3;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.login-box button:hover{
background:#083b7a;
}

.login-box a{
display:block;
margin-top:15px;
text-decoration:none;
color:#0a4fa3;
}

</style>

</head>

<body>


<div class="login-container">

<div class="login-box">

<h2>Login to Tax Connect</h2>

<form>

<input type="email" placeholder="Enter Email" required>

<input type="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<a href="#">Forgot Password?</a>

<a href="signup.html">Create an Account</a>

</div>

</div>


</body>

</html>
